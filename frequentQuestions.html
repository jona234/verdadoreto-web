const rangesData = [{"es": "Novato", "en": "Novice", "de": "Neuling", "zh": "新手", "exp": "0 - 299", "img": "novato"}, {"es": "Curioso", "en": "Curious", "de": "Neugierig", "zh": "好奇者", "exp": "300 - 999", "img": "curioso"}, {"es": "Activo", "en": "Active", "de": "Aktiv", "zh": "活跃", "exp": "1.000 - 2.199", "img": "activo"}, {"es": "Habitual", "en": "Regular", "de": "Regelmäßig", "zh": "常客", "exp": "2.200 - 5.999", "img": "habitual"}, {"es": "Atrevido", "en": "Daring", "de": "Mutig", "zh": "大胆", "exp": "6.000 - 11.999", "img": "atrevido"}, {"es": "Influyente", "en": "Influential", "de": "Einflussreich", "zh": "有影响力", "exp": "12.000 - 24.999", "img": "influyente"}, {"es": "Imparable", "en": "Unstoppable", "de": "Unaufhaltsam", "zh": "势不可挡", "exp": "25.000 - 49.999", "img": "imparable"}, {"es": "Élite", "en": "Elite", "de": "Elite", "zh": "精英", "exp": "50.000 - 89.999", "img": "elite"}, {"es": "Leyenda", "en": "Legend", "de": "Legende", "zh": "传奇", "exp": "90.000 - 129.999", "img": "leyenda"}, {"es": "Mítico", "en": "Mythic", "de": "Mythisch", "zh": "神话", "exp": "130.000+", "img": "mitico"}];

function getRangeName(r, lang) {
  if (lang==='en') return r.en;
  if (lang==='de') return r.de;
  if (lang==='zh') return r.zh;
  return r.es;
}

function buildRanges(lang) {
  const base = "https://github.com/jona234/verdadoreto-web/blob/main/assets/icons/rangos/";
  return '<div class="ranges-grid">' + rangesData.map(r =>
    '<div class="range-item">' +
    '<img src="' + base + r.img + '.png?raw=true" alt="' + getRangeName(r,lang) + '" style="width:40px;height:40px;object-fit:contain;flex-shrink:0">' +
    '<div class="range-info">' +
    '<span class="range-name">' + getRangeName(r,lang) + '</span>' +
    '<span class="range-exp">' + r.exp + ' EXP</span>' +
    '</div></div>'
  ).join('') + '</div>';
}

function buildCard(card, lang) {
  let h = '<div class="card ' + (card.type||'') + '">';
  if (card.badge) h += '<span class="badge ' + card.badge + '">' + card.badgeText + '</span>';
  if (card.heading) h += '<h3>' + card.heading + '</h3>';
  if (card.body) h += '<p>' + card.body + '</p>';
  if (card.steps) card.steps.forEach((s,i) => { h += '<p class="step"><span class="step-number">'+(i+1)+'.</span> '+s+'</p>'; });
  if (card.list) h += '<ul>' + card.list.map(l => '<li>'+l+'</li>').join('') + '</ul>';
  if (card.bodyAfter) h += '<p>' + card.bodyAfter + '</p>';
  if (card.ranges) h += buildRanges(lang);
  return h + '</div>';
}

function render(lang) {
  const t = translations[lang] || translations['es'];
  document.getElementById('header-sub').textContent = t.headerSub;
  document.title = t.headerSub + ' — Verdad o Reto';
  document.getElementById('footer-text').textContent = t.footer;
  let html = '<h1>' + t.title + '</h1><span class="subtitle">' + t.subtitle + '</span><p>' + t.intro + '</p>';
  t.sections.forEach(function(section) {
    html += '<h2>' + section.title + '</h2>';
    section.cards.forEach(function(card) { html += buildCard(card, lang); });
  });
  html += '<div class="contact-box"><p>' + t.contactText + '</p><a href="mailto:apweb.2f.jona@gmail.com">apweb.2f.jona@gmail.com</a></div>';
  document.getElementById('content').innerHTML = html;
}

const params = new URLSearchParams(window.location.search);
const lang = params.get('lang') || 'es';
render(['es','en','de','zh'].includes(lang) ? lang : 'es');
